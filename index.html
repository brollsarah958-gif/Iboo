<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAUUSD Pro — منصة الذهب الاحترافية</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#FFD700;--gold2:#FFA500;--gold3:#B8860B;
  --green:#00FF88;--green2:#00CC66;
  --red:#FF3355;--red2:#CC2244;
  --blue:#00CFFF;--purple:#9B59B6;
  --bg:#020509;--bg2:#060C14;--bg3:#0A1220;--bg4:#0F1A2E;
  --border:rgba(255,215,0,0.12);--border2:rgba(255,215,0,0.25);
  --text:#D0DCF0;--dim:#4A6080;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;overflow-x:hidden;min-height:100vh;}

/* HEADER */
.hdr{
background:linear-gradient(90deg,#020509,#060C14,#020509);
border-bottom:1px solid var(–border);
display:flex;align-items:center;justify-content:space-between;
padding:0 16px;height:58px;position:sticky;top:0;z-index:300;
backdrop-filter:blur(20px);
}
.logo{font-family:‘Orbitron’,monospace;font-weight:900;font-size:1.2rem;color:var(–gold);text-shadow:0 0 20px rgba(255,215,0,.5);letter-spacing:3px;}
.logo small{display:block;font-family:‘Cairo’,sans-serif;font-weight:300;font-size:.62rem;color:var(–dim);letter-spacing:2px;margin-top:1px;}
.hdr-mid{display:flex;flex-direction:column;align-items:center;}
.live-badge{display:flex;align-items:center;gap:5px;font-size:.6rem;color:var(–green);font-family:‘Orbitron’,monospace;letter-spacing:1px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(–green);box-shadow:0 0 8px var(–green);animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.clock{font-family:‘Orbitron’,monospace;font-size:.95rem;color:var(–gold);letter-spacing:1px;}
.datestr{font-size:.6rem;color:var(–dim);font-family:‘Share Tech Mono’,monospace;}

/* TICKER */
.ticker-wrap{border-bottom:1px solid var(–border);background:var(–bg2);height:44px;overflow:hidden;}

/* LAYOUT */
.wrap{display:grid;grid-template-columns:1fr 300px;gap:8px;padding:8px;max-width:1900px;margin:0 auto;}

/* CHART BOX */
.chart-box{background:var(–bg2);border:1px solid var(–border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;}
.chart-toolbar{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(–bg3);border-bottom:1px solid var(–border);flex-wrap:wrap;gap:6px;}
.tf-btns{display:flex;gap:3px;}
.tf{padding:3px 10px;border:1px solid var(–border);border-radius:4px;background:transparent;color:var(–dim);font-family:‘Orbitron’,monospace;font-size:.58rem;cursor:pointer;transition:.2s;letter-spacing:.5px;}
.tf:hover,.tf.on{background:rgba(255,215,0,.1);border-color:var(–gold);color:var(–gold);box-shadow:0 0 8px rgba(255,215,0,.15);}
.ind-tags{display:flex;gap:4px;flex-wrap:wrap;}
.itag{padding:2px 6px;border-radius:3px;background:rgba(255,215,0,.06);color:var(–gold3);border:1px solid rgba(255,215,0,.15);font-size:.58rem;}
#tvChart{flex:1;min-height:440px;}

/* ACTIVE TRADE BANNER */
.active-trade-banner{
display:none;
padding:10px 14px;
border-top:1px solid var(–border);
background:var(–bg3);
font-size:.7rem;
}
.active-trade-banner.show{display:block;}
.atb-inner{display:grid;grid-template-columns:auto 1fr repeat(4,auto);align-items:center;gap:12px;}
.atb-dir{font-family:‘Orbitron’,monospace;font-size:.9rem;font-weight:900;padding:4px 12px;border-radius:6px;}
.atb-dir.buy{background:rgba(0,255,136,.15);color:var(–green);border:1px solid rgba(0,255,136,.3);}
.atb-dir.sell{background:rgba(255,51,85,.15);color:var(–red);border:1px solid rgba(255,51,85,.3);}
.atb-info{display:flex;flex-direction:column;gap:2px;}
.atb-title{font-family:‘Orbitron’,monospace;font-size:.62rem;color:var(–gold);letter-spacing:1px;}
.atb-reason{font-size:.62rem;color:var(–dim);}
.atb-level{display:flex;flex-direction:column;align-items:center;gap:2px;font-family:‘Share Tech Mono’,monospace;}
.atb-lbl{font-size:.55rem;color:var(–dim);text-transform:uppercase;}
.atb-val{font-size:.75rem;font-weight:700;}
.atb-pnl{font-family:‘Orbitron’,monospace;font-size:1rem;font-weight:900;text-align:center;}
.progress-bar{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width .5s;}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:7px;}
.panel{background:var(–bg2);border:1px solid var(–border);border-radius:10px;overflow:hidden;}
.ph{padding:8px 12px;background:var(–bg3);border-bottom:1px solid var(–border);font-family:‘Orbitron’,monospace;font-size:.62rem;color:var(–gold);letter-spacing:1px;display:flex;align-items:center;justify-content:space-between;}
.dot2{width:5px;height:5px;border-radius:50%;background:var(–green);box-shadow:0 0 5px var(–green);animation:blink 2s infinite;}

/* PRICE WIDGET */
.price-box{padding:0;overflow:hidden;height:100px;}

/* TRADE SIGNALS */
.trades{padding:6px;display:flex;flex-direction:column;gap:4px;max-height:340px;overflow-y:auto;}
.trades::-webkit-scrollbar{width:2px;}
.trades::-webkit-scrollbar-thumb{background:var(–border);}

.trow{
background:var(–bg3);border-radius:7px;padding:7px 9px;
border:1px solid rgba(255,255,255,.04);font-size:.65rem;
transition:.3s;cursor:pointer;position:relative;overflow:hidden;
}
.trow:hover{border-color:rgba(255,215,0,.2);}
.trow.active-signal{border-color:var(–gold);box-shadow:0 0 12px rgba(255,215,0,.15);}
.trow.hit-tp{border-color:var(–green);background:rgba(0,255,136,.05);}
.trow.hit-sl{border-color:var(–red);background:rgba(255,51,85,.05);}
.trow-header{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.ttf{font-family:‘Orbitron’,monospace;font-size:.55rem;padding:2px 5px;border-radius:3px;font-weight:700;}
.ttf.buy{background:rgba(0,255,136,.15);color:var(–green);}
.ttf.sell{background:rgba(255,51,85,.15);color:var(–red);}
.tdir{font-family:‘Orbitron’,monospace;font-size:.68rem;font-weight:900;}
.tdir.buy{color:var(–green)}.tdir.sell{color:var(–red)}
.tstatus{margin-right:auto;font-size:.55rem;padding:1px 5px;border-radius:3px;}
.tstatus.open{background:rgba(255,215,0,.1);color:var(–gold);}
.tstatus.closed-tp{background:rgba(0,255,136,.1);color:var(–green);}
.tstatus.closed-sl{background:rgba(255,51,85,.1);color:var(–red);}
.trow-levels{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;font-family:‘Share Tech Mono’,monospace;}
.tlevel{display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,.2);border-radius:3px;padding:3px 4px;}
.tlevel-lbl{font-size:.5rem;color:var(–dim);text-transform:uppercase;}
.tlevel-val{font-size:.62rem;font-weight:700;}
.tlevel-val.ep{color:var(–text);}
.tlevel-val.sl{color:var(–red);}
.tlevel-val.tp1{color:rgba(0,255,136,.7);}
.tlevel-val.tp2{color:var(–green);}
.trow-meta{display:flex;justify-content:space-between;margin-top:4px;font-size:.55rem;color:var(–dim);}
.tpips{color:var(–gold);font-family:‘Orbitron’,monospace;font-size:.58rem;}
.treason{font-size:.58rem;color:var(–dim);margin-top:3px;line-height:1.4;}

/* ANALYSIS */
.ana{padding:8px 11px;font-size:.65rem;line-height:1.7;direction:rtl;max-height:200px;overflow-y:auto;}
.ana::-webkit-scrollbar{width:2px;}
.ana p{margin-bottom:5px;}
.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.55rem;margin-left:2px;}
.tag.bull{background:rgba(0,255,136,.15);color:var(–green);}
.tag.bear{background:rgba(255,51,85,.15);color:var(–red);}
.tag.ob{background:rgba(255,165,0,.15);color:var(–gold2);}
.tag.fvg{background:rgba(0,207,255,.15);color:var(–blue);}
.tag.liq{background:rgba(255,215,0,.15);color:var(–gold);}
.tag.wyck{background:rgba(155,89,182,.15);color:var(–purple);}

/* NEWS */
.news{padding:5px 6px;display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto;}
.news::-webkit-scrollbar{width:2px;}
.ni{background:var(–bg3);border-radius:5px;padding:5px 8px;border-right:3px solid;font-size:.6rem;}
.ni.high{border-color:var(–red);}
.ni.med{border-color:var(–gold2);}
.ni.low{border-color:var(–dim);}
.ni.alert{animation:borderBlink 1s infinite;}
@keyframes borderBlink{0%,100%{opacity:1}50%{opacity:.3}}
.ntime{font-size:.55rem;color:var(–blue);margin-bottom:1px;display:flex;gap:5px;align-items:center;}
.ncnt{color:var(–red);font-weight:700;font-size:.6rem;}
.ntxt{color:var(–text);line-height:1.3;}
.nfx{color:var(–dim);font-size:.55rem;margin-top:1px;}

/* BOTTOM */
.bottom-row{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}

/* GAUGES */
.gg{padding:8px;display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.gi{background:var(–bg3);border-radius:6px;padding:6px 8px;}
.gn{color:var(–dim);font-size:.55rem;margin-bottom:3px;}
.gbar{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-bottom:2px;}
.gfill{height:100%;border-radius:2px;transition:width 1.5s;}
.gfill.bull{background:linear-gradient(90deg,rgba(0,255,136,.2),var(–green));}
.gfill.bear{background:linear-gradient(90deg,rgba(255,51,85,.2),var(–red));}
.gfill.neu{background:linear-gradient(90deg,rgba(255,215,0,.2),var(–gold));}
.gval{font-family:‘Orbitron’,monospace;font-size:.62rem;font-weight:700;}

/* STRUCTURE */
.str-c{padding:7px 10px;}
.si{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.62rem;}
.si:last-child{border-bottom:none;}
.sl2{color:var(–dim);font-size:.58rem;}
.sv{font-size:.63rem;font-weight:700;}

/* ORDER FLOW */
.of{padding:7px;}
.ofr{display:grid;grid-template-columns:60px 1fr 30px;gap:5px;align-items:center;margin-bottom:4px;font-size:.6rem;}
.ofl{color:var(–dim);font-size:.55rem;}
.ofbar{height:4px;background:rgba(255,255,255,.05);border-radius:2px;}
.offill{height:100%;border-radius:2px;transition:width 1s;}
.ofpct{font-family:‘Orbitron’,monospace;font-size:.55rem;font-weight:700;}

/* MARKET FORECAST */
.forecast{padding:8px 10px;font-size:.62rem;}
.fc-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.fc-item:last-child{border-bottom:none;}
.fc-tf{font-family:‘Orbitron’,monospace;font-size:.58rem;color:var(–dim);}
.fc-dir{display:flex;align-items:center;gap:4px;font-size:.6rem;font-weight:700;}
.fc-prob{font-family:‘Share Tech Mono’,monospace;font-size:.62rem;color:var(–gold);}
.fc-bar{height:3px;flex:1;background:rgba(255,255,255,.05);border-radius:2px;margin:0 6px;overflow:hidden;}
.fc-fill{height:100%;border-radius:2px;}

/* TOAST */
.toast{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(–bg3);border:1px solid var(–gold);border-radius:8px;padding:10px 20px;font-size:.72rem;z-index:999;text-align:center;box-shadow:0 0 20px rgba(255,215,0,.2);max-width:460px;direction:rtl;}
.toast.show{display:block;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateX(-50%) translateY(14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* SIGNAL CLOSED OVERLAY */
.closed-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-family:‘Orbitron’,monospace;font-size:.8rem;font-weight:900;border-radius:7px;opacity:0;transition:.3s;}
.closed-overlay.show{opacity:1;}
.closed-overlay.tp{background:rgba(0,255,136,.15);color:var(–green);}
.closed-overlay.sl{background:rgba(255,51,85,.15);color:var(–red);}

@media(max-width:1100px){.wrap{grid-template-columns:1fr;}.bottom-row{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.bottom-row{grid-template-columns:1fr;}.hdr{flex-wrap:wrap;height:auto;padding:8px;gap:6px;}}
</style>

</head>

<script>
// ═══════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════
function updateClock(){
  const t=new Intl.DateTimeFormat('de-DE',{timeZone:'Europe/Berlin',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date());
  const d=new Intl.DateTimeFormat('ar',{timeZone:'Europe/Berlin',weekday:'short',year:'numeric',month:'short',day:'numeric'}).format(new Date());
  document.getElementById('clock').textContent=t;
  document.getElementById('dateStr').textContent='🇩🇪 '+d;
}
setInterval(updateClock,1000);updateClock();

// ═══════════════════════════════════════════
// TRADINGVIEW CHART
// ═══════════════════════════════════════════
var tvWidget;
function createChart(interval){
  if(tvWidget){try{tvWidget.remove();}catch(e){}}
  tvWidget=new TradingView.widget({
    autosize:true,symbol:"OANDA:XAUUSD",interval:interval||"1",
    timezone:"Europe/Berlin",theme:"dark",style:"1",locale:"ar",
    toolbar_bg:"#0A1220",enable_publishing:false,
    hide_top_toolbar:false,hide_legend:false,save_image:false,
    container_id:"tv_main",
    studies:["MASimple@tv-basicstudies","MAExp@tv-basicstudies","RSI@tv-basicstudies","MACD@tv-basicstudies","BB@tv-basicstudies"],
    overrides:{
      "mainSeriesProperties.candleStyle.upColor":"#00FF88",
      "mainSeriesProperties.candleStyle.downColor":"#FF3355",
      "mainSeriesProperties.candleStyle.wickUpColor":"#00FF88",
      "mainSeriesProperties.candleStyle.wickDownColor":"#FF3355",
      "mainSeriesProperties.candleStyle.borderUpColor":"#00FF88",
      "mainSeriesProperties.candleStyle.borderDownColor":"#FF3355",
      "paneProperties.background":"#060C14",
      "paneProperties.backgroundType":"solid",
      "scalesProperties.textColor":"#4A6080"
    }
  });
}
function switchTF(btn){
  document.querySelectorAll('.tf').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  createChart(btn.dataset.tf);
}
createChart('1');

// ═══════════════════════════════════════════
// REFERENCE PRICE
// ═══════════════════════════════════════════
let P=3320,PH=3345,PL=3290,PO=3305;
async function loadPrice(){
  try{
    const r=await fetch('https://api.gold-api.com/price/XAU');
    const d=await r.json();
    if(d&&d.price){
      P=+d.price;
      if(d.high_price)PH=+d.high_price;
      if(d.low_price)PL=+d.low_price;
      if(d.open_price||d.prev_close_price)PO=+(d.open_price||d.prev_close_price);
      checkActiveSignals();
      refreshAll();
    }
  }catch(e){}
}
loadPrice();setInterval(loadPrice,10000);

// ═══════════════════════════════════════════
// SMART SIGNAL ENGINE
// ═══════════════════════════════════════════
const TF_CONFIG={
  'M1':{v:0.8, slMult:2.5, tp1Mult:3, tp2Mult:6, tp3Mult:10, pips:10},
  'M5':{v:1.5, slMult:2.5, tp1Mult:3, tp2Mult:6, tp3Mult:10, pips:10},
  'M15':{v:2.5, slMult:2.5, tp1Mult:3, tp2Mult:6, tp3Mult:10, pips:10},
  'H1':{v:5,   slMult:2.5, tp1Mult:3, tp2Mult:6, tp3Mult:10, pips:10},

// Signals store: array of signal objects
let signals = {};

// Market bias (updates with price)
function getMarketBias(){
  const trend = P > PO;
  const momentum = P > (PH+PL)/2;
  if(trend && momentum) return {dir:'buy', strength:0.75, label:'صاعد قوي'};
  if(trend && !momentum) return {dir:'buy', strength:0.55, label:'صاعد ضعيف'};
  if(!trend && !momentum) return {dir:'sell', strength:0.75, label:'هابط قوي'};
  return {dir:'sell', strength:0.55, label:'هابط ضعيف'};
}

// ICT/SMC reasons pool
const BUY_REASONS=[
  'OB صاعد + BOS تأكيد + سحب SSL',
  'FVG مُملوء + CHoCH صعودي + EMA تقاطع',
  'منطقة تجميع Wyckoff Spring + Discount Zone',
  'سيولة SSL محصودة + Order Block دفاعي',
  'تقاطع EMA9/21 + RSI خروج من تشبع بيع',
  'Breaker Block صاعد + VWAP فوق + حجم متزايد',
  'Fair Value Gap + Institutional Order Flow صاعد',
  'Previous Day Low محصود + انعكاس هيكل',
];
const SELL_REASONS=[
  'OB هابط + CHoCH هبوطي + سحب BSL',
  'FVG هبوطي + BOS كسر + EMA ضغط',
  'Wyckoff Distribution UTAD + Premium Zone',
  'سيولة BSL محصودة + Bearish Order Block',
  'تقاطع EMA هبوطي + RSI خروج من تشبع شراء',
  'Breaker Block هابط + VWAP تحت + حجم بيع',
  'Fair Value Gap هبوطي + Smart Money هابط',
  'Previous Day High محصود + هيكل هابط',
];

function generateSignal(tfName){
  const cfg = TF_CONFIG[tfName];
  const bias = getMarketBias();
  // Use bias with some randomness for realism
  const rand = Math.random();
  const isBuy = rand < bias.strength ? bias.dir==='buy' : bias.dir!=='buy';

  const slippage = (Math.random()*0.3)*cfg.v;
  const ep = +(P + (isBuy ? -(Math.random()*cfg.v*0.5+slippage) : (Math.random()*cfg.v*0.5+slippage))).toFixed(2);
  const slDist = cfg.v * cfg.slMult * (0.8+Math.random()*0.4);
  const sl  = +(isBuy ? ep-slDist : ep+slDist).toFixed(2);
  const tp1 = +(isBuy ? ep+cfg.v*cfg.tp1Mult : ep-cfg.v*cfg.tp1Mult).toFixed(2);
  const tp2 = +(isBuy ? ep+cfg.v*cfg.tp2Mult : ep-cfg.v*cfg.tp2Mult).toFixed(2);
  const tp3 = +(isBuy ? ep+cfg.v*cfg.tp3Mult : ep-cfg.v*cfg.tp3Mult).toFixed(2);
  const rr1 = Math.abs((tp1-ep)/(ep-sl)).toFixed(1);
  const pipsToTP1 = Math.abs(tp1-ep).toFixed(1);
  const pipsToSL  = Math.abs(sl-ep).toFixed(1);
  const reasons = isBuy ? BUY_REASONS : SELL_REASONS;
  const reason = reasons[Math.floor(Math.random()*reasons.length)];

  return {
    tf:tfName, dir:isBuy?'buy':'sell',
    ep, sl, tp1, tp2, tp3, rr1,
    pipsToTP1, pipsToSL,
    reason, status:'open',
    openTime: Date.now(),
    hitTP:0, // 0=none, 1=tp1, 2=tp2, 3=tp3
    pnl:0,
  };
}

function initSignals(){
  const tfs=['M1','M5','M15','H1','H4','D1'];
  tfs.forEach(tf=>{
    signals[tf] = generateSignal(tf);
  });
}
initSignals();

// Check if price hit SL or TP
function checkActiveSignals(){
  let changed=false;
  Object.keys(signals).forEach(tf=>{
    const s=signals[tf];
    if(s.status!=='open') return;
    const isBuy=s.dir==='buy';
    // Check SL
    if((isBuy&&P<=s.sl)||(!isBuy&&P>=s.sl)){
      s.status='closed-sl';
      s.pnl=-Math.abs(s.sl-s.ep);
      showToast(`🛑 صفقة ${tf} ${isBuy?'شراء':'بيع'} أغلقت على Stop Loss — خسارة ${Math.abs(s.sl-s.ep).toFixed(1)} نقطة`,'red');
      changed=true;
      // Generate new signal after 30s
      setTimeout(()=>{signals[tf]=generateSignal(tf);renderTrades();},30000);
    }
    // Check TP1
    else if(s.hitTP<1&&((isBuy&&P>=s.tp1)||(!isBuy&&P<=s.tp1))){
      s.hitTP=1;
      s.pnl=Math.abs(s.tp1-s.ep);
      showToast(`✅ ${tf}: وصل TP1 — ${Math.abs(s.tp1-s.ep).toFixed(1)} نقطة ربح! انتظار TP2...`,'green');
      changed=true;
    }
    // Check TP2
    else if(s.hitTP<2&&((isBuy&&P>=s.tp2)||(!isBuy&&P<=s.tp2))){
      s.hitTP=2;
      s.pnl=Math.abs(s.tp2-s.ep);
      showToast(`🎯 ${tf}: وصل TP2 — ${Math.abs(s.tp2-s.ep).toFixed(1)} نقطة! انتظار TP3...`,'green');
      changed=true;
    }
    // Check TP3 (final)
    else if(s.hitTP<3&&((isBuy&&P>=s.tp3)||(!isBuy&&P<=s.tp3))){
      s.hitTP=3;
      s.status='closed-tp';
      s.pnl=Math.abs(s.tp3-s.ep);
      showToast(`🏆 ${tf}: أُغلقت على TP3 الكامل — ${Math.abs(s.tp3-s.ep).toFixed(1)} نقطة ربح!`,'gold');
      changed=true;
      setTimeout(()=>{signals[tf]=generateSignal(tf);renderTrades();},60000);
    }
    // Update live PnL
    if(s.status==='open'){
      s.pnl = isBuy ? P-s.ep : s.ep-P;
    }
  });
  if(changed) renderTrades();
  updateActiveBanner();
}

// Calculate progress to TP1
function calcProgress(s){
  if(s.status!=='open') return 100;
  const isBuy=s.dir==='buy';
  const total=Math.abs(s.tp1-s.ep);
  const current=isBuy?P-s.ep:s.ep-P;
  return Math.max(0,Math.min(100,(current/total)*100));
}

function renderTrades(){
  const order=['M1','M5','M15','H1','H4','D1'];
  let html='';
  order.forEach(tf=>{
    const s=signals[tf];
    const isBuy=s.dir==='buy';
    const pnlColor=s.pnl>=0?'var(--green)':'var(--red)';
    const pnlSign=s.pnl>=0?'+':'';
    const statusLabel=s.status==='open'?'مفتوحة':s.status==='closed-tp'?'✅ TP':s.status==='closed-sl'?'🛑 SL':'';
    const statusClass=s.status==='open'?'open':s.status==='closed-tp'?'closed-tp':'closed-sl';
    const prog=calcProgress(s);
    const tp1Done=s.hitTP>=1?'✓':'';
    const tp2Done=s.hitTP>=2?'✓':'';
    html+=`
    <div class="trow ${s.status==='open'?'active-signal':s.status==='closed-tp'?'hit-tp':s.status==='closed-sl'?'hit-sl':''}">
      <div class="trow-header">
        <div class="ttf ${isBuy?'buy':'sell'}">${tf}</div>
        <div class="tdir ${isBuy?'buy':'sell'}">${isBuy?'▲ BUY':'▼ SELL'}</div>
        <div class="tstatus ${statusClass}">${statusLabel}</div>
        <div style="font-family:'Orbitron',monospace;font-size:.6rem;color:${pnlColor}">${pnlSign}${s.pnl.toFixed(1)}</div>
      </div>
      <div class="trow-levels">
        <div class="tlevel"><div class="tlevel-lbl">EP</div><div class="tlevel-val ep">${s.ep}</div></div>
        <div class="tlevel"><div class="tlevel-lbl">SL 🛑</div><div class="tlevel-val sl">${s.sl}</div></div>
        <div class="tlevel"><div class="tlevel-lbl">TP1${tp1Done}</div><div class="tlevel-val tp1">${s.tp1}</div></div>
        <div class="tlevel"><div class="tlevel-lbl">TP2${tp2Done}</div><div class="tlevel-val tp2">${s.tp2}</div></div>
      </div>
      <div class="trow-meta">
        <span style="color:var(--dim)">TP3: <span style="color:var(--green)">${s.tp3}</span></span>
        <span class="tpips">نقاط SL: ${s.pipsToSL} | نقاط TP1: ${s.pipsToTP1}</span>
        <span style="color:var(--gold)">RR: ${s.rr1}R</span>
      </div>
      ${s.status==='open'?`<div class="progress-bar" style="margin-top:4px"><div class="progress-fill" style="width:${prog}%;background:${isBuy?'var(--green)':'var(--red)'}"></div></div>`:''}
      <div class="treason">${s.reason}</div>
    </div>`;
  });
  document.getElementById('tradeSignals').innerHTML=html;
}
renderTrades();
